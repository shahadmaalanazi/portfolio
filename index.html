<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Shahad Portfolio</title>

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
overflow-x:hidden;
}

/* STARS */

.stars{
position:fixed;
width:100%;
height:100%;
background:transparent;
z-index:-1;
}

.stars::after{
content:"";
position:absolute;
width:2px;
height:2px;
background:white;
box-shadow:
200px 300px white,
400px 500px white,
800px 200px white,
100px 700px white,
600px 600px white,
900px 400px white,
300px 900px white,
700px 800px white,
1200px 200px white,
1400px 500px white;
animation:moveStars 50s linear infinite;
}

@keyframes moveStars{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 50px;
background:#020617;
position:sticky;
top:0;
}

nav h2{
color:#a855f7;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
}

nav a:hover{
color:#a855f7;
}

/* HERO */

.hero{
text-align:center;
padding:150px 20px;
background:radial-gradient(circle,#1e1b4b,#020617);
}

.hero h1{
font-size:55px;
margin-bottom:10px;
}

.hero p{
color:#cbd5f5;
margin-bottom:30px;
}

/* SECTION */

section{
padding:80px 60px;
max-width:1100px;
margin:auto;
}

h2{
margin-bottom:25px;
}

/* PROJECTS */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.card{
background:#111827;
padding:20px;
border-radius:15px;
cursor:pointer;
transition:0.3s;
text-align:center;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 0 20px rgba(168,85,247,0.4);
}

.card img{
width:100%;
height:230px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

/* SKILLS */

.skill{
display:inline-block;
padding:10px 18px;
margin:6px;
border-radius:20px;
background:#1e293b;
}

/* CONTACT */

.contact{
text-align:center;
}

.contact a{
display:inline-block;
margin:15px;
}

.contact img{
width:40px;
filter:brightness(2);
transition:0.3s;
}

.contact img:hover{
transform:scale(1.2);
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
overflow-y:auto;
}

.modal-content{
background:#111827;
padding:30px;
max-width:700px;
max-height:85vh;
margin:60px auto;
border-radius:15px;
text-align:center;
overflow-y:auto;
}

.modal img{
width:100%;
height:auto;
border-radius:10px;
margin-top:15px;
}

.close{
float:right;
font-size:28px;
cursor:pointer;
}

/* FOOTER */

footer{
text-align:center;
padding:30px;
background:#020617;
color:#94a3b8;
}

</style>

</head>

<body>

<div class="stars"></div>

<div id="projectModal" class="modal">

<span class="close" onclick="closeProject()">×</span>

<h2 id="projectTitle"></h2>

<img id="projectImage">

<p id="projectDesc"></p>

</div>

<script>

function openProject(title,image,desc){

document.getElementById("projectModal").style.display="block";

document.getElementById("projectTitle").innerText=title;

document.getElementById("projectImage").src=image;

document.getElementById("projectDesc").innerText=desc;

}

function closeProject(){

document.getElementById("projectModal").style.display="none";

}

</script>

</body>
</html>
